/* ---------- v1.2.0a layout restore: OCR add-on only ---------- */
.camera-first-card{
  text-align:left;
  padding:16px;
}
.camera-first-card .scan-panel-title{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:10px;
}
.camera-first-card .scan-panel-title .scan-panel-icon{
  width:42px;
  height:42px;
  border-radius:15px;
  display:grid;
  place-items:center;
  border:1px solid rgba(184,154,192,.22);
  background:rgba(17,21,26,.28);
  color:var(--purple-light);
  font-size:1.25rem;
}
.camera-first-card h3{
  margin:0;
}
.camera-first-card p{
  margin:0;
  color:var(--muted);
  line-height:1.35;
  font-size:.88rem;
}
.camera-first-card .scan-hint{
  margin-top:8px;
}
.camera-start-row{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  margin-top:12px;
}
.capture-preview-drawer{
  padding:0;
  display:block;
  overflow:hidden;
}
.capture-preview-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:12px;
}
.capture-preview-title{
  display:grid;
  gap:2px;
}
.capture-preview-title strong{
  color:var(--cream);
}
.capture-preview-title span{
  color:var(--muted);
  font-size:.82rem;
}
.capture-toggle-btn{
  width:38px;
  height:38px;
  border-radius:14px;
  border:1px solid rgba(184,154,192,.26);
  background:rgba(17,21,26,.45);
  color:var(--purple-light);
  display:grid;
  place-items:center;
  flex:0 0 38px;
}
.capture-toggle-btn svg{
  width:19px;
  height:19px;
  stroke:currentColor;
  stroke-width:2.4;
  fill:none;
  stroke-linecap:round;
}
.capture-preview-body{
  display:grid;
  grid-template-columns:84px 1fr;
  gap:12px;
  align-items:center;
  padding:0 12px 12px;
}
.capture-preview-body.is-closed{
  display:none;
}
.capture-thumb{
  width:84px;
  height:84px;
  object-fit:cover;
  border-radius:18px;
  border:1px solid rgba(184,154,192,.24);
  background:#11151a;
}
.capture-meta{
  display:grid;
  gap:4px;
}
.capture-meta span{
  color:var(--muted);
  font-size:.8rem;
}
.next-step-note{
  grid-column:1/-1;
  padding:9px 11px;
  border-radius:14px;
  border:1px solid rgba(184,154,192,.18);
  background:rgba(17,21,26,.22);
  color:var(--muted);
  font-size:.83rem;
  line-height:1.35;
}


/* ---------- v1.2.2 OCR Contrast Modes ---------- */
.camera-hint strong{color:white;font-family:var(--display-font);font-size:.96rem;letter-spacing:.02em}
.lens-shell{
  width:min(92vw,390px) !important;
  height:min(58dvh,520px) !important;
  max-height:calc(100dvh - 246px) !important;
  aspect-ratio:auto !important;
  top:47% !important;
  border-radius:30px !important;
  border-color:rgba(255,255,255,.78) !important;
  background:rgba(0,0,0,.04);
}
.ocr-guide-label{
  position:absolute;
  left:50%;
  top:10px;
  transform:translateX(-50%);
  z-index:2;
  border:1px solid rgba(255,255,255,.20);
  border-radius:999px;
  padding:6px 10px;
  background:rgba(0,0,0,.42);
  color:#fff;
  font-family:var(--display-font);

  {name:"salmon",aliases:["salmon","atlantic salmon"],category:"proteins",normal:"usually_gentle",flare:"caution",risk:"low",reason:"Soft protein, though fat level can matter for some people."},

  {terms:["pepperoni pizza","pizza"],name:"pepperoni pizza",normal:"likely_rough",flare:"flare_caution",why:"Higher fat, dairy, tomato acidity, spice, and processed meat can stack up for Crohn's symptoms."},
  {terms:["cheese pizza"],name:"cheese pizza",normal:"caution",flare:"flare_caution",why:"Dairy, fat, tomato acidity, and wheat can make this a caution item."},

function escapeHtml(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));}
function normalizeText(s){return String(s||"").toLowerCase().replace(/[^a-z0-9%\.\s-]/g," ").replace(/\s+/g," ").trim();}
function containsTerm(hay,term){const h=normalizeText(hay);const t=normalizeText(term);if(!t)return false;return new RegExp(`(^|\\s)${t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")}(s|es)?($|\\s)`).test(h)||h.includes(t);}
function uniqueByName(arr){const seen=new Set();return arr.filter(x=>{const k=x.name||x.label;if(seen.has(k))return false;seen.add(k);return true;});}
function ratingClass(r){return ratingMeta[r]?.cls||"rating-ehh";}
function ratingLabel(r){return ratingMeta[r]?.label||"unknown";}
function stateClass(r){return ratingMeta[r]?.state||"ehh";}
function ratingPill(r,flareSide=false){let label=ratingLabel(r),cls=ratingClass(r);if(flareSide&&(r==="likely_rough"||r==="personal_trigger"||r==="flare_caution")){label="🔥 flare caution";cls="rating-flare";}return `<span class="rating-pill ${cls}">${escapeHtml(label)}</span>`;}

function getActiveRating(a){return state.mode==="Flare"?a.flare:a.normal;}
function parseNutritionText(text){const t=normalizeText(text);const n={};function pick(key,patterns){for(const p of patterns){const m=t.match(p);if(m){n[key]=Number(m[1]);return;}}}pick("fiber",[/fiber\s*(\d+(?:\.\d+)?)\s*g/]);pick("sugar",[/total sugars?\s*(\d+(?:\.\d+)?)\s*g/,/sugars?\s*(\d+(?:\.\d+)?)\s*g/]);pick("addedSugar",[/added sugars?\s*(\d+(?:\.\d+)?)\s*g/]);pick("fat",[/total fat\s*(\d+(?:\.\d+)?)\s*g/]);pick("satFat",[/saturated fat\s*(\d+(?:\.\d+)?)\s*g/]);pick("protein",[/protein\s*(\d+(?:\.\d+)?)\s*g/]);pick("sodium",[/sodium\s*(\d+(?:\.\d+)?)\s*mg/]);return n;}
function nutritionTraits(n){const traits=[],notes=[];if(n.fiber>=5){traits.push({name:"higher fiber",normal:"caution",flare:"flare_caution",reason:"Higher fiber can be harder during sensitive periods."});notes.push("fiber is higher");}else if(n.fiber>=0&&n.fiber<=2){traits.push({name:"lower fiber",normal:"usually_gentle",flare:"usually_gentle",reason:"Lower fiber is often easier during sensitive periods."});notes.push("fiber is lower");}if(n.fat>=12){traits.push({name:"higher fat",normal:"caution",flare:"flare_caution",reason:"Higher fat can speed motility for some people."});notes.push("fat is higher");}else if(n.fat>=0&&n.fat<=3){traits.push({name:"lower fat",normal:"usually_gentle",flare:"usually_gentle",reason:"Lower fat may be easier for some people."});}if(n.sugar>=14||n.addedSugar>=8){traits.push({name:"higher sugar",normal:"caution",flare:"caution",reason:"Higher sugar can bother some people or affect urgency."});notes.push("sugar is higher");}if(n.protein>=10){traits.push({name:"protein support",normal:"usually_gentle",flare:"caution",reason:"Protein is useful context, but preparation and ingredients still matter."});}if(n.sodium>=700){traits.push({name:"high sodium",normal:"caution",flare:"caution",reason:"High sodium is a tracking item, especially for packaged foods."});notes.push("sodium is high");}return {traits,notes};}
function findIngredientMatches(text){const hits=[];INGREDIENT_DICTIONARY.forEach(item=>{if(item.aliases.some(a=>containsTerm(text,a)))hits.push({...item,source:"ingredient"});});return uniqueByName(hits);}
function findFastCards(text){const hits=[];FAST_CARDS.forEach(card=>{if(card.terms.some(t=>containsTerm(text,t)))hits.push({...card,source:"quick"});});return hits;}
function worstRating(items,mode="normal"){const score={usually_gentle:1,good:1,caution:2,flare_caution:3,personal_trigger:4,likely_rough:5,unknown:2};let worst="unknown",best=0;items.forEach(x=>{const r=mode==="Flare"?x.flare:x.normal;const s=score[r]||2;if(s>best){best=s;worst=r;}});return worst;}
function buildAnalysis(type){const textParts=[state.foodName,state.ingredientText,type==="ocr"?state.extractedText:""].filter(Boolean).join("\n");const input=textParts.trim();const quickHits=findFastCards(input);const ingredientHits=findIngredientMatches(input);const nutrition=parseNutritionText(input);const nt=nutritionTraits(nutrition);const all=[...quickHits,...ingredientHits,...nt.traits];let detected="Unknown food";if(quickHits[0])detected=quickHits[0].name;else if(state.foodName.trim())detected=state.foodName.trim();else if(ingredientHits[0])detected=`${ingredientHits[0].name} found`;else if(nt.traits.length)detected="nutrition label read";const normal=all.length?worstRating(all,"normal"):"unknown";const flare=all.length?worstRating(all,"Flare"):"unknown";const active=state.mode==="Flare"?flare:normal;let why="I do not have enough text to judge this yet. Add a food name, ingredients, or nutrition text.";if(all.length){const reasons=all.slice(0,4).map(x=>x.reason||x.why).filter(Boolean);why=reasons.length?reasons.join(" "):"The rating comes from matched food, ingredient, and nutrition signals.";}let next="Track your own response and portion size. Crohn's tolerance is individual.";if(active==="usually_gentle")next="This looks more predictable, but still track your own response.";if(active==="caution")next="Start small or save this for a steadier gut day if you are unsure.";if(active==="flare_caution"||active==="likely_rough"||active==="personal_trigger")next="During a flare or sensitive period, this deserves extra caution.";return {type,detected,normal,flare,active,why,next,hits:all,nutrition,confidence:all.length>=3?"good":all.length?"fair":"low",createdAt:new Date().toISOString()};}

function nutritionTiles(n){const entries=Object.entries(n).filter(([,v])=>v!==undefined&&!Number.isNaN(v));if(!entries.length)return `<p class="small-muted">No nutrition numbers were detected yet.</p>`;const labels={fiber:"Fiber",sugar:"Sugar",addedSugar:"Added sugar",fat:"Total fat",satFat:"Sat. fat",protein:"Protein",sodium:"Sodium"};return `<div class="nutrition-grid">${entries.map(([k,v])=>`<div class="nutrition-tile"><span>${labels[k]||k}</span><strong>${v}${k==="sodium"?" mg":" g"}</strong></div>`).join("")}</div>`;}
function resultCard(a){if(!a)return "";const cls=stateClass(a.active);return `<section class="result-shell ${cls}" id="resultCard"><div class="result-inner"><div class="verdict-area">${ratingPill(a.active,state.mode==="Flare")}<h3>${escapeHtml(ratingLabel(a.active))}</h3><div class="detected-name">${escapeHtml(a.detected)} • confidence: ${escapeHtml(a.confidence)}</div></div><p class="result-copy">${escapeHtml(a.why)}</p><p class="result-copy"><strong>Next:</strong> ${escapeHtml(a.next)}</p>${a.hits?.length?`<div class="detected-list">${a.hits.slice(0,12).map(h=>`<span class="detected-chip">${escapeHtml(h.name)}</span>`).join("")}</div>`:""}<div class="compare-row"><div class="compare-box"><span>normal side</span>${ratingPill(a.normal,false)}</div><div class="compare-box"><span>flare side</span>${ratingPill(a.flare,true)}</div></div><div class="button-row"><button class="secondary-action" data-action="save-current" type="button">save it</button><button class="primary-action" data-action="ate-current" type="button">ate it</button></div><details class="support-drawer"><summary>nutrition support drawer</summary>${nutritionTiles(a.nutrition)}</details></div></section>`;}
function ocrPillClass(){if(state.ocrConfidence==="good")return "good-read";if(state.ocrConfidence==="weak")return "weak-read";if(state.ocrConfidence==="none"||state.ocrConfidence==="error")return "no-read";return "";}

    <p class="ocr-mode-note">Green, glossy, or dark packaging may need the negative/high-contrast retry. Review/edit stays optional.</p>
  </section>`;
}

  const previewIcon=state.capturePreviewOpen?`<svg viewBox="0 0 24 24"><path d="M5 12h14"></path></svg>`:`<svg viewBox="0 0 24 24"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>`;
  return `<div class="screen-content">${screenTitle("scan","camera-first food check")}

    ${ocrReviewCard()}
    <section class="input-card quick-card scan-clean-card"><h3>Quick Read</h3><p>Use this when you already know the food name.</p><input class="search-box" id="foodName" value="${escapeHtml(state.foodName)}" placeholder="example: pepperoni pizza, tomato soup, rice" autocomplete="off"><div class="button-row"><button class="secondary-action" data-action="clear-scan" type="button">clear</button><button class="primary-action" data-action="quick-read" type="button">quick read</button></div></section>
    <section class="input-card scan-clean-card" id="deepDrawer"><h3>Deep Check</h3><p>Paste or type ingredients/nutrition text here. OCR text is copied here when you run OCR Deep Check.</p><textarea class="text-input" id="ingredientText" placeholder="ingredients: wheat flour, tomato puree, mozzarella cheese, garlic powder...">${escapeHtml(state.ingredientText)}</textarea><div class="button-row"><button class="secondary-action" data-action="copy-ocr-to-deep" type="button">use OCR text</button><button class="primary-action" data-action="deep-check" type="button">deep check</button></div></section>
    <section class="input-card"><h3>demo buttons</h3><div class="demo-chip-row"><button class="demo-chip" data-action="demo" data-kind="good" type="button">rice</button><button class="demo-chip" data-action="demo" data-kind="caution" type="button">mac cheese</button><button class="demo-chip" data-action="demo" data-kind="ugly" type="button">pepperoni pizza</button><button class="demo-chip" data-action="demo" data-kind="ocr" type="button">OCR label sample</button></div></section>
    ${a?resultCard(a):""}${state.savedNotice?`<p class="save-notice">${escapeHtml(state.savedNotice)}</p>`:""}

function flareScreen(){return `<div class="screen-content">${screenTitle("flare","tighten the scanner")}<section class="input-card"><h3>mode</h3><div class="mode-toggle"><button class="${state.mode==="normal"?"selected":""}" data-mode="normal" type="button">normal</button><button class="${state.mode==="Flare"?"selected":""}" data-mode="Flare" type="button">🔥 flare</button></div><p style="margin-top:10px;">Flare Mode keeps the purple app theme but adds a slow amber warning pulse and weighs scanned results more cautiously.</p></section><section class="mini-card"><h3>flare-side rule</h3><p>Rough or ugly items show as a flare-style caution pill on the flare-side comparison, so the card reads as a flare warning instead of a traffic-light lecture.</p></section></div>`;}
function meScreen(){return `<div class="screen-content">${screenTitle("me","test notes and memory")}<section class="memory-card"><h3>Personal Food Memory</h3><p>Local test saves only. No account, no cloud, no official merge yet.</p>${savedFoodsList()}</section><section class="mini-card"><h3>test checklist</h3><p>Test OCR on ingredient panels, nutrition labels, curved packages, bad lighting, and small print. The goal is finding the failure points before adding automation.</p></section></div>`;}
function getSavedFoods(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");}catch(e){return [];}}
function setSavedFoods(items){localStorage.setItem(STORAGE_KEY,JSON.stringify(items));}
function saveCurrentFood(kind="saved"){if(!state.lastAnalysis){state.savedNotice="Run a check first.";render();return;}const items=getSavedFoods();items.unshift({id:crypto?.randomUUID?.()||String(Date.now()),kind,detected:state.lastAnalysis.detected,rating:ratingLabel(state.lastAnalysis.active),mode:state.mode,createdAt:new Date().toLocaleString()});setSavedFoods(items.slice(0,20));state.savedNotice=kind==="ate"?"Logged as eaten for this test device.":"Saved to Personal Food Memory.";render();}
function savedFoodsList(){const items=getSavedFoods();if(!items.length)return `<p class="small-muted">No saved foods yet.</p>`;return `<div class="saved-list">${items.slice(0,8).map(item=>`<div class="saved-item"><strong>${escapeHtml(item.detected)}</strong><span>${escapeHtml(item.rating)} • ${escapeHtml(item.mode)} • ${escapeHtml(item.kind)} • ${escapeHtml(item.createdAt)}</span></div>`).join("")}</div>`;}
function demoResult(kind){if(kind==="good"){state.foodName="plain white rice";state.ingredientText="ingredients: rice. nutrition: total fat 0g fiber 1g protein 4g sodium 0mg";}if(kind==="caution"){state.foodName="mac and cheese";state.ingredientText="ingredients: pasta, cheese, milk, cream, wheat flour. nutrition: total fat 12g fiber 2g protein 10g sodium 690mg";}if(kind==="ugly"){state.foodName="pepperoni pizza";state.ingredientText="ingredients: wheat flour, mozzarella cheese, tomato paste, pepperoni, garlic powder, onion powder, spices. nutrition: total fat 18g saturated fat 8g fiber 3g sodium 820mg";}if(kind==="ocr"){state.foodName="";state.extractedText="INGREDIENTS: enriched wheat flour, tomato puree, mozzarella cheese, pepperoni, garlic powder, onion powder, spices. NUTRITION FACTS: Total Fat 18g, Fiber 3g, Sugars 4g, Protein 13g, Sodium 820mg.";state.ingredientText=state.extractedText;state.ocrStatus="Sample OCR text loaded. Run Deep Check or review/edit text.";state.ocrProgress=100;state.ocrConfidence="good";state.ocrReviewOpen=false;}analyze(kind==="ocr"?"ocr":"demo");}
function cleanOcrText(text){
  const cleaned=String(text||"")
    .replace(/\r/g,"\n")
    .replace(/[\t ]+/g," ")
    .replace(/\n{3,}/g,"\n\n")
    .trim();
  return correctLikelyOcrWords(cleaned);
}
function correctLikelyOcrWords(text){
  return String(text||"")
    .replace(/garli[cç][^a-z]?/gi,"garlic ")
    .replace(/garl[i1]c/gi,"garlic")
    .replace(/on[i1l]on/gi,"onion")
    .replace(/sod[i1l]um/gi,"sodium")
    .replace(/m[i1l]lk/gi,"milk")
    .replace(/butt[e3]r/gi,"butter")
    .replace(/c[i1l]tr[i1l]c/gi,"citric")
    .replace(/lact[i1l]c/gi,"lactic")
    .replace(/dr[i1l]ed/gi,"dried")
    .replace(/conta[i1l]ns/gi,"contains")
    .replace(/b[i1l]oeng[i1l]neered/gi,"bioengineered")
    .replace(/sesam[e3]/gi,"sesame");
}
function ocrProgressText(m){
  if(!m||!m.status)return "Reading text…";
  const pct=typeof m.progress==="number"?Math.max(0,Math.min(100,Math.round(m.progress*100))):state.ocrProgress;
  if(typeof pct==="number")state.ocrProgress=Math.max(state.ocrProgress||0,pct);
  return `Reading text… ${state.ocrProgress||0}%`;
}
function scoreOcrText(text){const chars=text.trim().length;const words=text.trim().split(/\s+/).filter(Boolean).length;const foodWords=/(ingredients|nutrition|sodium|fiber|protein|fat|sugar|milk|wheat|cheese|rice|chicken|tomato|garlic|onion)/i.test(text);if(chars>80&&words>10&&foodWords)return "good";if(chars>25&&words>4)return "weak";return "none";}
function cropDataUrlForOcr(dataUrl,mode="contrast"){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const w=img.naturalWidth||img.width;
      const h=img.naturalHeight||img.height;
      const cropW=Math.round(w*.84);
      const cropH=Math.round(h*.58);
      const sx=Math.round((w-cropW)/2);
      const sy=Math.round((h-cropH)/2);
      const canvas=document.createElement("canvas");
      const targetW=1100;
      const scale=targetW/cropW;
      canvas.width=targetW;
      canvas.height=Math.round(cropH*scale);
      const ctx=canvas.getContext("2d",{willReadFrequently:true});
      ctx.drawImage(img,sx,sy,cropW,cropH,0,0,canvas.width,canvas.height);
      try{
        const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
        const d=imageData.data;
        for(let i=0;i<d.length;i+=4){
          let gray=(d[i]*.299+d[i+1]*.587+d[i+2]*.114);
          if(mode==="invert") gray=255-gray;
          if(mode==="threshold"){
            const v=gray>142?255:0;
            d[i]=d[i+1]=d[i+2]=v;
          }else{
            const boost=mode==="invert"?38:30;
            const pivot=mode==="invert"?132:145;
            const boosted=gray<pivot?Math.max(0,gray-boost):Math.min(255,gray+boost);
            d[i]=d[i+1]=d[i+2]=boosted;
          }
        }
        ctx.putImageData(imageData,0,0);
      }catch(e){}
      resolve({dataUrl:canvas.toDataURL("image/jpeg",.86),width:canvas.width,height:canvas.height,mode});
    };
    img.onerror=()=>resolve({dataUrl,width:0,height:0,mode});
    img.src=dataUrl;
  });
}
async function recognizeWithMode(mode,label,baseProgress){
  const cropped=await cropDataUrlForOcr(state.capturedImage,mode);
  state.capturedOcrImage=cropped.dataUrl;
  state.ocrMode=label;
  state.ocrStatus=`Reading text… ${label}`;
  state.ocrProgress=baseProgress||3;
  renderOcrStatusOnly();
  const result=await Tesseract.recognize(state.capturedOcrImage||state.capturedImage,"eng",{
    logger:m=>{
      if(m&&typeof m.progress==="number"){
        const raw=Math.round(m.progress*100);
        const adjusted=Math.min(98,Math.max(state.ocrProgress||0,Math.round((baseProgress||0)+(raw*.72))));
        state.ocrProgress=adjusted;
      }
      state.ocrStatus=`Reading text… ${label} ${Math.round(state.ocrProgress||0)}%`;
      renderOcrStatusOnly();
    }
  });
  const text=cleanOcrText(result?.data?.text||"");
  return {text,confidence:scoreOcrText(text),mode,label};
}
function betterOcrResult(a,b){
  const rank={none:0,error:0,weak:1,good:2};
  const ar=rank[a?.confidence]||0,br=rank[b?.confidence]||0;
  if(br>ar)return b;
  if(br===ar && (b?.text||"").length>(a?.text||"").length)return b;
  return a;
}

function renderOcrStatusOnly(){
  const status=document.getElementById("ocrStatusText");
  const pill=document.getElementById("ocrStatusPill");
  const fill=document.getElementById("ocrProgressFill");
  const pct=Math.max(0,Math.min(100,Math.round(state.ocrProgress||0)));
  if(status)status.textContent=state.ocrStatus||"";
  if(fill)fill.style.width=pct+"%";
  if(pill){
    pill.textContent=state.ocrInProgress?`reading ${pct}%`:(state.extractedText?"text found":"review");
    pill.className=`ocr-status-pill ${ocrPillClass()}`;
  }
}
async function runOcrOnCapturedImage(forceMode="auto"){
  if(!state.capturedImage)return;
  if(!window.Tesseract){
    state.ocrInProgress=false;
    state.ocrConfidence="error";
    state.ocrStatus="OCR library did not load. Check connection, then retry OCR or type the text manually.";
    state.ocrReviewOpen=true;
    render();
    return;
  }
  state.ocrInProgress=true;
  state.ocrProgress=0;
  state.ocrStatus="Preparing label crop… 0%";
  state.extractedText="";
  state.ocrConfidence="idle";
  state.ocrReviewOpen=false;
  state.ocrAttempts=0;
  state.ocrMode=forceMode==="invert"?"negative":"auto clean";
  render();
  try{
    let best=null;
    if(forceMode==="invert"){
      state.ocrAttempts=1;
      best=await recognizeWithMode("invert","negative/high contrast",8);
    }else if(forceMode==="threshold"){
      state.ocrAttempts=1;
      best=await recognizeWithMode("threshold","black-and-white contrast",8);
    }else{
      state.ocrAttempts=1;
      best=await recognizeWithMode("contrast","auto clean crop",3);
      if(best.confidence!=="good"){
        state.ocrStatus="Weak read. Trying negative/high contrast…";
        state.ocrProgress=Math.max(state.ocrProgress,54);
        state.ocrAttempts=2;
        renderOcrStatusOnly();
        const inverted=await recognizeWithMode("invert","negative/high contrast",58);
        best=betterOcrResult(best,inverted);
      }
    }
    state.extractedText=best?.text||"";
    state.ingredientText=state.extractedText;
    state.ocrConfidence=best?.confidence||"none";
    state.ocrMode=best?.label||state.ocrMode;
    state.ocrProgress=100;
    if(state.ocrConfidence==="good")state.ocrStatus=`Text found using ${state.ocrMode}. Run Deep Check or review the scanned text first.`;
    else if(state.ocrConfidence==="weak")state.ocrStatus=`I found some text using ${state.ocrMode}, but it may need review.`;
    else{state.ocrStatus="I couldn’t read enough text. Try less glare, retry negative/contrast, or type ingredients manually.";state.ocrReviewOpen=true;}
  }catch(err){
    state.ocrConfidence="error";
    state.ocrStatus="OCR failed. You can retry OCR, retry negative/contrast, or type the ingredient text manually.";
    state.ocrReviewOpen=true;
  }finally{
    state.ocrInProgress=false;
    render();
    scrollScreenTo("ocrStatusText");
  }
}
function captureInputs(){["foodName","ingredientText","extractedText"].forEach(id=>{const el=document.getElementById(id);if(el)state[id]=el.value;});}
function copyOcrToDeep(runNow=false){captureInputs();state.ingredientText=state.extractedText;state.scanView="expanded";localStorage.setItem(VIEW_KEY,state.scanView);if(runNow){analyze("ocr");return;}render();setTimeout(()=>document.getElementById("ingredientText")?.focus(),80);}
function scrollScreenTo(id){setTimeout(()=>{const screen=document.getElementById("screen");const el=document.getElementById(id);if(screen&&el)screen.scrollTo({top:Math.max(0,el.offsetTop-14),behavior:"smooth"});},80);}
function render(){document.body.classList.toggle("flare-active",state.mode==="Flare");document.querySelectorAll(".nav-button").forEach(b=>b.classList.toggle("active",b.dataset.tab===state.activeTab));const screen=document.getElementById("screen");if(state.activeTab==="home")screen.innerHTML=homeScreen();if(state.activeTab==="scan")screen.innerHTML=scanScreen();if(state.activeTab==="flare")screen.innerHTML=flareScreen();if(state.activeTab==="me")screen.innerHTML=meScreen();bindDynamicInputs();}
function bindDynamicInputs(){["foodName","ingredientText","extractedText"].forEach(id=>{const el=document.getElementById(id);if(el){el.oninput=()=>captureInputs();el.onkeydown=e=>{if(e.key==="Enter"&&id==="foodName"){e.preventDefault();analyze("quick");}};}});document.querySelectorAll("[data-mode]").forEach(btn=>btn.onclick=()=>setMode(btn.dataset.mode));document.querySelectorAll("[data-action]").forEach(btn=>btn.onclick=()=>handleAction(btn.dataset.action,btn));}
function handleAction(a,btn){if(a==="go-scan"){state.activeTab="scan";render();return;}if(a==="go-flare"){state.activeTab="flare";render();return;}if(a==="open-camera"){openCameraOverlay();return;}if(a==="toggle-capture-preview"){state.capturePreviewOpen=!state.capturePreviewOpen;render();return;}if(a==="quick-read"){analyze("quick");return;}if(a==="deep-check"){analyze("deep");return;}if(a==="copy-ocr-to-deep"){copyOcrToDeep(false);return;}if(a==="run-ocr-deep-check"){copyOcrToDeep(true);return;}if(a==="toggle-ocr-review"){captureInputs();state.ocrReviewOpen=!state.ocrReviewOpen;render();if(state.ocrReviewOpen)setTimeout(()=>document.getElementById("extractedText")?.focus(),80);return;}if(a==="retry-ocr"){state.ocrStatus="OCR retry starting…";state.ocrReviewOpen=false;render();setTimeout(()=>runOcrOnCapturedImage("auto"),80);return;}if(a==="retry-ocr-invert"){state.ocrStatus="Negative/high-contrast retry starting…";state.ocrReviewOpen=false;render();setTimeout(()=>runOcrOnCapturedImage("invert"),80);return;}if(a==="retry-ocr-threshold"){state.ocrStatus="Black-and-white contrast retry starting…";state.ocrReviewOpen=false;render();setTimeout(()=>runOcrOnCapturedImage("threshold"),80);return;}if(a==="clear-scan"){state.foodName="";state.ingredientText="";state.extractedText="";state.capturedOcrImage="";state.ocrStatus="";state.ocrProgress=0;state.ocrInProgress=false;state.ocrReviewOpen=false;state.ocrConfidence="idle";state.ocrMode="auto clean";state.ocrAttempts=0;state.capturePreviewOpen=true;state.lastAnalysis=null;state.savedNotice="";state.capturedImage="";state.capturedMeta=null;state.cameraMessage="";render();return;}if(a==="save-current"){saveCurrentFood("saved");return;}if(a==="ate-current"){saveCurrentFood("ate");return;}if(a==="demo"){demoResult(btn.dataset.kind);return;}}
document.querySelectorAll(".nav-button").forEach(btn=>{btn.onclick=()=>{state.activeTab=btn.dataset.tab;render();};});
let cameraStream=null,cameraFacing="environment",cameraInProgress=false;
async function openCameraOverlay(){const overlay=document.getElementById("cameraOverlay");const video=document.getElementById("cameraVideo");const status=document.getElementById("cameraStatus");overlay.classList.add("active");overlay.setAttribute("aria-hidden","false");status.textContent="Opening camera…";try{if(cameraStream)cameraStream.getTracks().forEach(t=>t.stop());cameraStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:cameraFacing,width:{ideal:1280},height:{ideal:1920}},audio:false});video.srcObject=cameraStream;await video.play();status.textContent="Ready. Fill the large box with ingredients or nutrition text. Do not fit the whole package.";}catch(e){status.textContent="Camera could not open. Check browser camera permission, then try again.";}}
function closeCameraOverlay(){if(cameraInProgress)return;const overlay=document.getElementById("cameraOverlay");overlay.classList.remove("active");overlay.setAttribute("aria-hidden","true");if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());cameraStream=null;}const video=document.getElementById("cameraVideo");video.srcObject=null;}
function captureFrame(){const video=document.getElementById("cameraVideo");const canvas=document.createElement("canvas");const w=video.videoWidth||720,h=video.videoHeight||1280;canvas.width=w;canvas.height=h;const ctx=canvas.getContext("2d");ctx.drawImage(video,0,0,w,h);const dataUrl=canvas.toDataURL("image/jpeg",.82);return {dataUrl,width:w,height:h,sizeKb:Math.round(dataUrl.length*0.75/1024)};}
async function startRecognitionScan(){if(cameraInProgress)return;const btn=document.getElementById("cameraScanProduct"),status=document.getElementById("cameraStatus"),badge=document.getElementById("countdownBadge"),frame=document.getElementById("progressFrame");cameraInProgress=true;btn.disabled=true;btn.textContent="scanning…";badge.classList.add("active");frame.classList.add("scanning");const frames=[];let remaining=5;status.textContent="Capturing for 5 seconds. Keep the label text inside the large box.";badge.textContent=remaining;const timer=setInterval(()=>{try{frames.push(captureFrame());}catch(e){}remaining-=1;badge.textContent=Math.max(remaining,0);status.textContent=remaining>0?`Capturing label… ${remaining} second${remaining===1?"":"s"} left.`:"Saving image…";if(remaining<=0){clearInterval(timer);setTimeout(()=>{const last=frames[frames.length-1]||captureFrame();state.capturedImage=last.dataUrl;state.capturedMeta={width:last.width,height:last.height,sizeKb:last.sizeKb};state.cameraMessage=`${frames.length||1} frame${(frames.length||1)===1?"":"s"} saved.`;state.activeTab="scan";state.extractedText="";state.capturedOcrImage="";state.ocrStatus="Image captured. Preparing cleaned center crop for OCR…";state.ocrProgress=0;state.ocrInProgress=false;state.ocrReviewOpen=false;state.ocrConfidence="idle";state.ocrMode="auto clean";state.ocrAttempts=0;state.capturePreviewOpen=true;if(state.lastAnalysis&&state.lastAnalysis.detected==="Unknown food")state.lastAnalysis=null;cameraInProgress=false;btn.disabled=false;btn.textContent="scan product";badge.classList.remove("active");frame.classList.remove("scanning");closeCameraOverlay();render();setTimeout(runOcrOnCapturedImage,150);},220);}},1000);}
document.getElementById("cameraScanProduct").onclick=startRecognitionScan;document.getElementById("cameraClose").onclick=()=>closeCameraOverlay();document.getElementById("cameraCancel").onclick=()=>{cameraInProgress=false;document.getElementById("cameraScanProduct").disabled=false;document.getElementById("cameraScanProduct").textContent="scan product";document.getElementById("countdownBadge").classList.remove("active");document.getElementById("progressFrame").classList.remove("scanning");closeCameraOverlay();};document.getElementById("cameraFlip").onclick=async()=>{cameraFacing=cameraFacing==="environment"?"user":"environment";await openCameraOverlay();};document.getElementById("cameraHelper").onclick=()=>{document.getElementById("cameraStatus").textContent="Tip: fill the large box with only the ingredients or nutrition panel. Tilt the package slightly to cut glare.";};
render();
