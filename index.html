<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#1b2027" />
<title>bill's bad belly — v1.0.10 locked tab test</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Baumans&display=swap");
:root{
  --display-font:"ITC Bauhaus","Bauhaus","Bauhaus 93","Baumans","Arial Rounded MT Bold","Trebuchet MS",sans-serif;
  --body-font:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --gunmetal:#1b2027;--gunmetal-soft:#242b34;--gunmetal-light:#303946;
  --purple:#7d5f86;--purple-light:#b89ac0;--cream:#f3edf4;--muted:#b8b0ba;
  --green:#9fb19f;--amber:#d7763e;--red:#b05467;--shadow:rgba(0,0,0,.35);
}
*{box-sizing:border-box}
html{touch-action:manipulation;-webkit-text-size-adjust:100%}
body{
  margin:0;min-height:100vh;background:radial-gradient(circle at top,#303946 0%,var(--gunmetal) 45%,#11151a 100%);
  color:var(--cream);font-family:var(--body-font);overscroll-behavior-y:none;padding-bottom:env(safe-area-inset-bottom,0px);
}
button,input,textarea{font:inherit}
button{cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none}
h1,h2,h3,.eyebrow,.nav-button,.primary-action,.secondary-action,.compact-action,.rating-pill,.mode-status-pill,.drawer-title{
  font-family:var(--display-font);letter-spacing:.02em;
}
.app-shell{
  width:min(100%,430px);min-height:100vh;margin:0 auto;
  padding:22px 16px calc(230px + env(safe-area-inset-bottom,0px));position:relative;
}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;min-height:76px}
.header-mascot-wrap{
  width:60px;height:82px;flex:0 0 60px;display:flex;align-items:flex-end;justify-content:center;filter:drop-shadow(0 10px 12px rgba(0,0,0,.42));
}
.header-mascot-fallback{
  width:58px;height:58px;border-radius:19px;display:grid;place-items:center;background:linear-gradient(145deg,var(--purple),#513d59);
  box-shadow:0 14px 30px var(--shadow),inset 0 1px 0 rgba(255,255,255,.2);font-family:var(--display-font);font-size:1.35rem;font-weight:900;color:white;
}
.brand-title-wrap{flex:1;min-width:0}
.eyebrow{margin:0 0 4px;color:var(--purple-light);font-size:.78rem;letter-spacing:.14em}
h1{margin:0;font-size:2rem;line-height:1;letter-spacing:-.04em;text-transform:lowercase;color:#9b6fa6;text-shadow:0 1px 0 #5e4867,0 3px 0 #33213c,0 10px 18px rgba(0,0,0,.54),0 0 16px rgba(155,111,166,.22)}
.logo-mark{width:54px;height:54px;flex:0 0 54px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(145deg,var(--purple),#513d59);box-shadow:0 14px 30px var(--shadow),inset 0 1px 0 rgba(255,255,255,.2);font-weight:900;letter-spacing:-.08em;text-transform:lowercase}
.screen-card{
  min-height:calc(100vh - 142px);background:rgba(36,43,52,.78);border:1px solid rgba(184,154,192,.25);
  border-radius:28px;padding:18px;box-shadow:0 20px 50px var(--shadow);backdrop-filter:blur(12px);position:relative;overflow:hidden;isolation:isolate;
}
.screen-card>*{position:relative;z-index:1}
body.flare-active .screen-card{
  border-color:rgba(215,118,62,.36);background:radial-gradient(circle at 8% 12%,rgba(197,138,233,.16),transparent 28%),rgba(30,24,37,.88);
  animation:flareAmberHeartbeat 15s ease-in-out infinite;
}
@keyframes flareAmberHeartbeat{
  0%,62%,100%{box-shadow:0 20px 50px rgba(0,0,0,.35),0 0 0 1px rgba(215,118,62,.08),0 0 10px rgba(215,118,62,.04)}
  69%{box-shadow:0 20px 50px rgba(0,0,0,.35),0 0 0 1px rgba(215,118,62,.24),0 0 24px rgba(215,118,62,.18),0 0 42px rgba(215,118,62,.08)}
}
@media (prefers-reduced-motion:reduce){body.flare-active .screen-card{animation:none}}
.screen-content{display:grid;gap:16px}
.screen-title{position:relative;padding-right:104px;min-height:42px}
.screen-title p{margin:0 0 6px;color:var(--purple-light);font-weight:700}
.screen-title h2{margin:0;font-size:1.35rem;line-height:1.2;letter-spacing:-.03em}
.mode-status-pill{
  position:absolute;top:0;right:0;z-index:6;display:inline-flex;align-items:center;gap:6px;min-height:32px;padding:6px 9px;border:1px solid rgba(184,154,192,.26);
  border-radius:999px;color:var(--cream);background:linear-gradient(145deg,rgba(48,57,70,.98),rgba(27,32,39,.96));
  box-shadow:0 10px 22px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.08);font-size:.72rem;font-weight:900;line-height:1;
}
.mode-flame{width:14px;height:18px;display:inline-block;flex:0 0 13px;border-radius:70% 55% 70% 55%;transform:rotate(45deg)}
.mode-status-pill.normal .mode-flame{background:radial-gradient(circle at 63% 70%,rgba(216,226,212,.9) 0 13%,transparent 18%),linear-gradient(145deg,#9fb19f 12%,#6f846f 58%,#4a5b51 100%)}
.mode-status-pill.flare .mode-flame{background:radial-gradient(circle at 66% 68%,rgba(255,154,76,.92) 0 16%,transparent 21%),linear-gradient(145deg,#c58ae9 10%,#7d5f86 55%,#e88036 100%);box-shadow:0 0 11px rgba(197,138,233,.45)}
.input-card,.result-card,.food-panel,.camera-launch-card,.belly-meter,.drawer{
  border:1px solid rgba(184,154,192,.22);background:linear-gradient(145deg,rgba(48,57,70,.96),rgba(27,32,39,.95));border-radius:22px;box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
}
.input-card,.result-card,.food-panel,.camera-launch-card{padding:14px}
.belly-meter{display:flex;gap:16px;align-items:center;padding:18px}
.belly-meter p,.belly-meter strong,.belly-meter span{display:block}
.belly-meter p{margin:0 0 3px;color:var(--muted)}
.belly-meter strong{font-size:1.8rem;line-height:1}
.belly-meter span{margin-top:6px;color:var(--muted);font-size:.9rem}
.primary-action,.secondary-action,.compact-action{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:48px;border-radius:16px;padding:12px 16px;color:var(--cream);text-transform:lowercase;font-weight:900;
}
.primary-action{border:0;background:linear-gradient(145deg,var(--purple),#5e4867);box-shadow:0 10px 24px rgba(125,95,134,.28)}
.secondary-action{border:1px solid rgba(184,154,192,.28);background:rgba(17,21,26,.5)}
.compact-action{min-height:40px;padding:8px 10px;border-radius:13px;font-size:.84rem}
.full-width{width:100%}
.button-stack{display:grid;gap:10px}
.grid-two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.search-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
input,textarea{
  width:100%;border:1px solid rgba(184,154,192,.22);border-radius:16px;padding:12px;background:rgba(17,21,26,.5);color:var(--cream);outline:none;
}
input::placeholder,textarea::placeholder{color:var(--muted)}
textarea{min-height:96px;resize:vertical}
.search-hint,.small-muted{margin:0;color:var(--muted);font-size:.86rem;line-height:1.35}
.viewbar{
  display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:12px;border:1px solid rgba(184,154,192,.22);border-radius:18px;background:rgba(17,21,26,.38);
}
.viewbar strong{color:var(--purple-light)}
.viewbar span{color:var(--muted);font-size:.82rem}
.drawer{overflow:hidden}
.drawer summary{list-style:none;cursor:pointer;padding:14px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;color:var(--cream);font-weight:900}
.drawer summary::-webkit-details-marker{display:none}
.drawer summary::after{content:"+";width:28px;height:28px;border-radius:999px;display:grid;place-items:center;background:rgba(17,21,26,.48);border:1px solid rgba(184,154,192,.25);color:var(--purple-light);font-family:var(--display-font)}
.drawer[open] summary::after{content:"−"}
.drawer-body{display:grid;gap:12px;padding:0 14px 14px}
body.compact .drawer.optional:not([open]){display:block}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{border:1px solid rgba(184,154,192,.22);background:rgba(17,21,26,.44);border-radius:999px;padding:7px 10px;color:var(--cream);font-size:.78rem;font-weight:800}
.chip.risk{text-shadow:0 0 6px rgba(215,118,62,.28)}
.chip.gentle{text-shadow:0 0 6px rgba(159,177,159,.28)}
.rating-pill{
  display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:7px 11px;min-width:72px;font-weight:900;font-size:.78rem;text-transform:none;background:rgba(17,21,26,.38);border:1px solid rgba(184,154,192,.30);color:var(--purple-light);
}
.rating-good{text-shadow:0 0 1px rgba(159,177,159,.55),0 0 6px rgba(159,177,159,.26)}
.rating-ehh{text-shadow:0 0 1px rgba(201,130,84,.55),0 0 6px rgba(201,130,84,.24)}
.rating-ugly{text-shadow:0 0 1px rgba(176,84,103,.55),0 0 6px rgba(176,84,103,.24)}
.rating-flare{text-shadow:0 0 1px rgba(215,118,62,.62),0 0 7px rgba(215,118,62,.28)}
.result-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.result-top h3{margin:0;color:var(--purple-light);font-size:1.06rem}
.result-top span{display:block;margin-top:3px;color:var(--muted);font-size:.82rem}
.why{line-height:1.42;color:#eadfff;background:rgba(0,0,0,.16);border:1px solid rgba(184,154,192,.17);border-radius:16px;padding:12px}
.next{line-height:1.38;color:#e4d8ea;background:rgba(125,95,134,.14);border:1px solid rgba(184,154,192,.24);border-radius:16px;padding:12px}
.saved-list{display:grid;gap:10px}
.saved-item{padding:12px;border-radius:16px;border:1px solid rgba(184,154,192,.18);background:rgba(17,21,26,.38)}
.saved-title{font-weight:900}
.saved-meta{color:var(--muted);font-size:.8rem;margin-top:3px}
.bottom-nav{
  position:fixed;left:50%;bottom:calc(10px + env(safe-area-inset-bottom,0px));transform:translateX(-50%);width:min(calc(100% - 24px),430px);
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px;border:1px solid rgba(184,154,192,.28);border-radius:24px;
  background:rgba(27,32,39,.94);box-shadow:0 18px 50px rgba(0,0,0,.55);backdrop-filter:blur(14px);z-index:9999;
}
.nav-button{display:grid;place-items:center;gap:4px;border:0;border-radius:17px;padding:10px 4px;background:transparent;color:var(--muted);text-transform:lowercase}
.nav-button span:last-child{font-size:.74rem;font-weight:700}
.nav-button.active{color:white;background:linear-gradient(145deg,var(--purple),#5e4867)}
.icon svg{width:22px;height:22px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.camera-overlay{position:fixed;inset:0;z-index:100000;display:none;background:#05070a;color:var(--cream);overflow:hidden}
.camera-overlay.active{display:block}
.camera-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#05070a}
.camera-safe-top{position:absolute;top:calc(12px + env(safe-area-inset-top,0px));left:12px;right:12px;z-index:8;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.camera-hint{max-width:250px;padding:10px 12px;border-radius:16px;background:rgba(27,32,39,.70);border:1px solid rgba(184,154,192,.20);color:rgba(243,237,244,.88);backdrop-filter:blur(12px);font-size:.82rem;line-height:1.32}
.camera-close,.camera-flip{min-width:44px;min-height:44px;border:1px solid rgba(255,255,255,.18);border-radius:999px;background:rgba(5,7,10,.58);color:white;backdrop-filter:blur(12px)}
.camera-lens-shell,.camera-progress-frame{position:absolute;left:12px;right:12px;top:calc(74px + env(safe-area-inset-top,0px));bottom:calc(164px + env(safe-area-inset-bottom,0px));border-radius:30px 30px 34px 34px;pointer-events:none;z-index:3}
.camera-lens-shell{border:2px solid rgba(48,57,70,.88);box-shadow:0 0 0 1px rgba(184,154,192,.12),inset 0 0 0 1px rgba(255,255,255,.08),0 18px 42px rgba(0,0,0,.36)}
.camera-corner{position:absolute;width:42px;height:42px;opacity:.72}
.camera-corner.tl{left:14px;top:14px;border-left:3px solid rgba(184,154,192,.60);border-top:3px solid rgba(184,154,192,.60);border-radius:14px 0 0 0}
.camera-corner.tr{right:14px;top:14px;border-right:3px solid rgba(184,154,192,.60);border-top:3px solid rgba(184,154,192,.60);border-radius:0 14px 0 0}
.camera-corner.bl{left:14px;bottom:14px;border-left:3px solid rgba(184,154,192,.60);border-bottom:3px solid rgba(184,154,192,.60);border-radius:0 0 0 14px}
.camera-corner.br{right:14px;bottom:14px;border-right:3px solid rgba(184,154,192,.60);border-bottom:3px solid rgba(184,154,192,.60);border-radius:0 0 14px 0}
.camera-progress-frame{opacity:0;transition:opacity .22s ease}
.collecting .camera-lens-shell,.analyzing .camera-lens-shell{border-color:rgba(159,177,159,.82);box-shadow:0 0 0 2px rgba(159,177,159,.34),0 0 28px rgba(159,177,159,.42),0 0 58px rgba(159,177,159,.22),inset 0 0 0 1px rgba(255,255,255,.12);animation:recognitionFullGreenPulse .95s ease-in-out infinite}
.collecting .camera-progress-frame,.analyzing .camera-progress-frame{opacity:1;border:3px solid rgba(183,205,183,.82);box-shadow:0 0 0 1px rgba(159,177,159,.30),0 0 30px rgba(159,177,159,.38),inset 0 0 22px rgba(159,177,159,.14);animation:recognitionFullGreenPulse .95s ease-in-out infinite}
@keyframes recognitionFullGreenPulse{0%,100%{filter:saturate(.92) brightness(.95);opacity:.78}50%{filter:saturate(1.28) brightness(1.26);opacity:1}}
.camera-dock{position:absolute;left:12px;right:12px;bottom:calc(10px + env(safe-area-inset-bottom,0px));z-index:7;display:grid;gap:8px;padding:12px;border-radius:26px;border:1px solid rgba(184,154,192,.24);background:linear-gradient(145deg,rgba(48,57,70,.94),rgba(27,32,39,.96));box-shadow:0 18px 50px rgba(0,0,0,.52),inset 0 1px 0 rgba(255,255,255,.06);backdrop-filter:blur(16px)}
.recognition-status{min-height:24px;color:var(--purple-light);font-size:.82rem;font-weight:900;text-align:center}
.recognition-scan-button{width:100%;min-height:54px;border:0;border-radius:18px;color:var(--cream);background:linear-gradient(145deg,var(--purple),#5e4867);box-shadow:0 12px 26px rgba(125,95,134,.32);font-size:1.05rem;font-weight:900;font-family:var(--display-font)}
.recognition-scan-button:disabled{opacity:.54}
.recognition-helper{margin:0;color:var(--muted);text-align:center;font-size:.84rem;line-height:1.28}
.recognition-cancel{min-height:38px;border:1px solid rgba(184,154,192,.22);border-radius:14px;color:var(--cream);background:rgba(17,21,26,.42);font-weight:900;font-family:var(--display-font)}
.camera-flash-confirm{position:absolute;inset:0;z-index:4;pointer-events:none;background:rgba(255,255,255,.82);opacity:0}
.camera-flash-confirm.active{animation:cameraCaptureFlash .22s ease-out}
@keyframes cameraCaptureFlash{0%{opacity:0}35%{opacity:.65}100%{opacity:0}}
.camera-error-box{position:absolute;left:18px;right:18px;top:50%;transform:translateY(-50%);display:none;gap:12px;padding:16px;border-radius:22px;background:rgba(27,32,39,.96);border:1px solid rgba(215,118,62,.38);box-shadow:0 18px 42px rgba(0,0,0,.54);z-index:10}
.camera-error-box.active{display:grid}
.camera-result-preview{display:block;width:100%;height:auto;max-height:360px;object-fit:contain;border-radius:16px;border:1px solid rgba(184,154,192,.22);background:rgba(17,21,26,.45)}

/* ---------- v1.0.5 camera-first layout polish ---------- */
.camera-priority-card{
  border-color:rgba(184,154,192,.34);
  background:
    radial-gradient(circle at 92% 8%,rgba(197,138,233,.12),transparent 28%),
    linear-gradient(145deg,rgba(54,63,76,.98),rgba(28,34,42,.98));
  box-shadow:0 14px 34px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.06);
}
.camera-priority-card h3{margin:0;color:#efe8f4;font-size:1.22rem}
.camera-priority-card .camera-subhead{margin:4px 0 0;color:var(--purple-light);font-size:.86rem;font-weight:900}
.scan-captured-card{
  border-color:rgba(159,177,159,.38);
  background:
    radial-gradient(circle at 8% 12%,rgba(159,177,159,.10),transparent 30%),
    linear-gradient(145deg,rgba(42,52,57,.98),rgba(22,29,34,.98));
}
.scan-captured-card h3{margin:0;color:#d9ead9;font-size:1.08rem}
.input-card.quick-card{
  border-color:rgba(184,154,192,.28);
  background:linear-gradient(145deg,rgba(45,53,65,.98),rgba(23,29,37,.98));
}
.result-card.answer-card{
  border-color:rgba(184,154,192,.36);
  background:
    radial-gradient(circle at 96% 5%,rgba(215,118,62,.07),transparent 26%),
    linear-gradient(145deg,rgba(34,40,50,.99),rgba(17,21,28,.99));
  box-shadow:0 16px 38px rgba(0,0,0,.26), inset 0 1px 0 rgba(255,255,255,.06);
}
.drawer{
  background:rgba(31,38,48,.78);
  border-color:rgba(184,154,192,.20);
  box-shadow:none;
}
.drawer[open]{
  border-color:rgba(184,154,192,.34);
  background:linear-gradient(145deg,rgba(43,52,64,.92),rgba(25,31,39,.92));
}
.viewbar{
  background:rgba(17,21,26,.25);
  border-style:dashed;
}
.section-kicker{
  margin:0;
  color:var(--muted);
  font-size:.84rem;
  line-height:1.35;
}
.camera-result-preview{
  margin-top:10px;
}


/* ---------- v1.0.6 thumbnail capture flow ---------- */
.capture-strip{
  display:grid;
  grid-template-columns:76px 1fr auto;
  gap:10px;
  align-items:center;
  padding:10px;
  border:1px solid rgba(159,177,159,.32);
  border-radius:18px;
  background:
    radial-gradient(circle at 8% 12%,rgba(159,177,159,.08),transparent 30%),
    rgba(17,21,26,.34);
}
.capture-thumb{
  width:76px;
  height:76px;
  object-fit:cover;
  border-radius:14px;
  border:1px solid rgba(184,154,192,.24);
  background:rgba(17,21,26,.50);
}
.capture-strip strong{
  color:#d9ead9;
  font-family:var(--display-font);
  font-size:1rem;
}
.capture-strip span{
  display:block;
  margin-top:3px;
  color:var(--muted);
  font-size:.78rem;
  line-height:1.25;
}
.capture-preview-drawer{
  border-color:rgba(159,177,159,.26);
  background:rgba(29,39,41,.72);
}
.capture-preview-drawer[open]{
  border-color:rgba(159,177,159,.42);
  background:linear-gradient(145deg,rgba(35,49,50,.94),rgba(21,30,32,.94));
}
.capture-preview-drawer summary{
  padding:10px;
}
.capture-preview-drawer summary::after{
  width:26px;
  height:26px;
}
.capture-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.no-result-note{
  border:1px dashed rgba(184,154,192,.22);
  border-radius:18px;
  padding:12px;
  color:var(--muted);
  background:rgba(17,21,26,.18);
  line-height:1.35;
}
.no-result-note strong{
  color:var(--purple-light);
}
@media(max-width:360px){
  .capture-strip{grid-template-columns:62px 1fr;align-items:start}
  .capture-strip .compact-action{grid-column:1 / -1;width:100%}
  .capture-thumb{width:62px;height:62px}
  .capture-actions{grid-template-columns:1fr}
}


/* ---------- v1.0.7 cleanup flow ---------- */
.app-shell{
  padding-bottom:calc(260px + env(safe-area-inset-bottom,0px)) !important;
}
.scan-clean-card{
  box-shadow:0 14px 34px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.05);
}
.capture-preview-drawer{
  padding:0 !important;
  border-radius:20px !important;
  background:rgba(22,31,33,.58) !important;
  border-color:rgba(159,177,159,.24) !important;
  overflow:hidden;
}
.capture-preview-drawer summary{
  min-height:auto !important;
  padding:8px !important;
  display:block !important;
}
.capture-preview-drawer summary::after{
  right:10px !important;
  top:50% !important;
  transform:translateY(-50%) !important;
  width:30px !important;
  height:30px !important;
}
.capture-strip{
  display:grid !important;
  grid-template-columns:58px 1fr !important;
  gap:10px !important;
  align-items:center !important;
  padding:8px 46px 8px 8px !important;
  min-height:74px;
  border:1px solid rgba(159,177,159,.26) !important;
  border-radius:16px !important;
}
.capture-thumb{
  width:58px !important;
  height:58px !important;
  border-radius:12px !important;
}
.capture-strip strong{
  font-size:.94rem !important;
  line-height:1.05;
}
.capture-strip span{
  font-size:.76rem !important;
  line-height:1.22;
}
.capture-mini-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;

function escapeHtml(v){return String(v||"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[ch]));}
function normalizeText(t){return String(t||"").toLowerCase().replace(/[’']/g,"").replace(/[^a-z0-9&\s-]/g," ").replace(/\s+/g," ").trim();}
function containsTerm(hay,term){const clean=normalizeText(term);if(!clean)return false;const esc=clean.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");return new RegExp("(^|\\s|-)"+esc+"($|\\s|-)","i").test(hay);}
function unique(a){return [...new Set(a)];}
function traitLabel(t){return TRAIT_LABELS[t]||t.replaceAll("_"," ");}
function formatConfidence(c){return String(c||"unknown").replaceAll("_"," ").replace(/\b\w/g,s=>s.toUpperCase());}
function ratingClass(r){if(r==="usually_gentle")return"good";if(r==="likely_rough"||r==="personal_trigger")return"ugly";if(r==="flare_caution")return"flare";return"ehh";}
function ratingPill(r){return `<span class="rating-pill rating-${ratingClass(r)}">${escapeHtml(RATINGS[r]||"unknown")}</span>`;}
function findFastCards(text){const hay=normalizeText(text);return MEAL_FAST_CARDS.filter(c=>containsTerm(hay,c.name)||c.aliases.some(a=>containsTerm(hay,a)));}
function findIngredientMatches(text){const hay=normalizeText(text);return INGREDIENT_DICTIONARY.filter(i=>[i.name,...i.aliases].some(t=>containsTerm(hay,t)));}
function findProducts(text){const hay=normalizeText(text);if(!hay)return[];return PRODUCT_DB.filter(p=>normalizeText(`${p.brand} ${p.name} ${p.category} ${p.notes}`).includes(hay)||hay.split(" ").some(w=>w.length>3&&normalizeText(`${p.name} ${p.category}`).includes(w))).slice(0,4);}
function applyRulebook(traits,base){const set=new Set(traits);let risk=0,gentle=0,flareRisk=0;set.forEach(t=>{if(RISK_TRAITS.has(t))risk++;if(GENTLE_TRAITS.has(t))gentle++;if(FLARE_TRAITS.has(t))flareRisk++;});let normal=base||"unknown";if(normal==="unknown"){if(risk===0&&gentle>0)normal="usually_gentle";else if(risk>=6)normal="likely_rough";else normal="caution";}if(normal==="usually_gentle"&&risk>=2)normal="caution";if(risk>=7)normal="likely_rough";let flare=normal;if(flareRisk===0&&normal==="usually_gentle")flare="usually_gentle";else if(flareRisk<=2&&normal==="usually_gentle")flare="caution";else if(flareRisk<=4)flare="flare_caution";else flare="likely_rough";return{normal,flare,risk,gentle,flareRisk};}
function analyze(type){
  captureInputs();

  const deep=type==="deep"?`${state.foodName} ${state.ingredientText}`:state.foodName;
  const cards=findFastCards(quick);
  const hits=findIngredientMatches(deep);
  const products=findProducts(state.foodName);
  let traits=[];cards.forEach(c=>traits.push(...c.likelyTraits));hits.forEach(h=>traits.push(...h.traits));traits=unique(traits);
  let base=cards[0]?.normalRating||products[0]?.normal||"unknown";
  const rules=applyRulebook(traits,base);
  let confidence="unknown";
  if(type==="deep"&&hits.length)confidence="ingredient_confirmed";
  else if(cards.length)confidence="template_based";
  else if(products.length)confidence="product_database_match";
  else if(state.foodName)confidence="preliminary";
  const detected=cards[0]?.name||products[0]?`${products[0]?.brand||""} ${products[0]?.name||""}`.trim():state.foodName||"Unknown food";
  const reason=cards.length?(cards[0].reason+(hits.length?` Ingredient words also matched: ${hits.slice(0,6).map(x=>x.name).join(", ")}.`:"")):hits.length?`Ingredient text matched ${hits.slice(0,8).map(x=>x.name).join(", ")}.`:products.length?products[0].notes:"No exact Fast Card yet. Use Deep Check or save this food to personal memory.";
  const next=type==="quick"&&!state.ingredientText.trim()?"Scan or paste the ingredient list for a deeper check.": "Save this food if you want the app to remember it, then log how it went after eating.";
  state.lastAnalysis={type,detected,cards,hits,products,traits,normalRating:rules.normal,flareRating:rules.flare,confidence,reason,next};
  state.savedNotice="";
  render();
}

function saveCurrentFood(log=false){

/* Camera */
let cameraStream=null,cameraFacingMode="environment",cameraInProgress=false;
function setCameraStatus(m){const el=document.getElementById("cameraStatus");if(el)el.textContent=m;}
function showCameraError(m){document.getElementById("cameraErrorText").textContent=m;document.getElementById("cameraErrorBox").classList.add("active");setCameraStatus("camera stopped");}
function hideCameraError(){document.getElementById("cameraErrorBox").classList.remove("active");}
function stopCameraStream(){if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());cameraStream=null;}}
async function openCameraOverlay(){
  const overlay=document.getElementById("cameraOverlay"),video=document.getElementById("cameraVideo");if(!overlay||!video)return;
  hideCameraError();overlay.classList.add("active");overlay.setAttribute("aria-hidden","false");overlay.classList.remove("collecting","analyzing");setCameraStatus("starting camera…");
  const countdown=document.getElementById("cameraCountdown"); if(countdown)countdown.textContent="";
  const scanBtn=document.getElementById("cameraScanProduct"); if(scanBtn){scanBtn.disabled=false;scanBtn.textContent="scan product";}
  const helper=document.getElementById("recognitionHelper"); if(helper)helper.textContent="5-second scan collects front, ingredients, nutrition, and barcode area if visible.";cameraInProgress=false;
  try{
    stopCameraStream();
    cameraStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:cameraFacingMode},width:{ideal:1920},height:{ideal:1080}},audio:false});
    video.srcObject=cameraStream;await video.play();setCameraStatus("ready to scan");
  }catch(e){
    const needsHttps=location.protocol!=="https:"&&location.hostname!=="localhost";
    showCameraError(needsHttps?"Camera requires HTTPS. Upload to GitHub Pages and test from Safari.":"Camera permission was blocked or unavailable. Check browser permission and try again.");
  }
}
function closeCameraOverlay(){if(cameraInProgress)return;stopCameraStream();const overlay=document.getElementById("cameraOverlay");overlay.classList.remove("active","collecting","analyzing");overlay.setAttribute("aria-hidden","true");}
function captureFrame(video,quality=.78,maxDimension=1400){
  const sw=video.videoWidth,sh=video.videoHeight,scale=Math.min(1,maxDimension/Math.max(sw,sh)),tw=Math.round(sw*scale),th=Math.round(sh*scale);
  const canvas=document.createElement("canvas");canvas.width=tw;canvas.height=th;const ctx=canvas.getContext("2d",{alpha:false});ctx.drawImage(video,0,0,tw,th);
  const dataUrl=canvas.toDataURL("image/jpeg",quality);return{dataUrl,width:tw,height:th,sizeKb:Math.round(dataUrl.length*.75/1024)};
}
function startRecognitionScan(){
  if(cameraInProgress)return;
  const overlay=document.getElementById("cameraOverlay"),video=document.getElementById("cameraVideo");
  if(!video||!video.videoWidth){setCameraStatus("camera not ready");return;}

  cameraInProgress=true;
  overlay.classList.remove("analyzing");
  overlay.classList.add("collecting");
  setCameraStatus("scan starting… 5");
  const scanBtn=document.getElementById("cameraScanProduct");
  if(scanBtn){scanBtn.disabled=true;scanBtn.textContent="scanning…";}
  const helper=document.getElementById("recognitionHelper");
  if(helper)helper.textContent="Hold steady or rotate slowly. Capture front, ingredients, and nutrition if visible.";
  const countdown=document.getElementById("cameraCountdown");
  if(countdown)countdown.textContent="5";
  if(navigator.vibrate)navigator.vibrate([22,34,22]);

  const started=performance.now(),duration=5000,frames=[];
  let lastSlot=-1,lastSecond=5;
  const labels=["front label","barcode area","ingredients","nutrition facts","saving image"];

  function tick(){
    const elapsed=performance.now()-started;
    const pct=Math.min(1,elapsed/duration);
    const secondsLeft=Math.max(1,Math.ceil((duration-elapsed)/1000));
    const slot=Math.min(4,Math.floor(pct*5));

    if(secondsLeft!==lastSecond){
      lastSecond=secondsLeft;
      if(countdown)countdown.textContent=String(secondsLeft);
      if(navigator.vibrate)navigator.vibrate(12);
    }

    if(slot!==lastSlot&&frames.length<5&&video.videoWidth){
      lastSlot=slot;
      frames.push(captureFrame(video));
    }

    setCameraStatus(`scanning… ${secondsLeft} · ${labels[Math.min(4,slot)]}`);

    if(elapsed<duration){
      requestAnimationFrame(tick);
    }else{
      overlay.classList.remove("collecting");
      overlay.classList.add("analyzing");
      if(countdown)countdown.textContent="";
      setCameraStatus("image captured.");
      const flash=document.getElementById("cameraFlashConfirm");
      flash.classList.remove("active");void flash.offsetWidth;flash.classList.add("active");
      if(navigator.vibrate)navigator.vibrate(45);

      setTimeout(()=>{
        const last=frames[frames.length-1]||captureFrame(video);
        state.capturedImage=last.dataUrl;
        state.capturedMeta={width:last.width,height:last.height,sizeKb:last.sizeKb};
        state.cameraMessage=`${frames.length||1} frame${(frames.length||1)===1?"":"s"} saved.`;
        state.activeTab="scan";
        // A photo alone is not a food result. Clear stale Unknown/photo-only analysis.
        if(state.lastAnalysis && state.lastAnalysis.detected==="Unknown food") state.lastAnalysis=null;
        cameraInProgress=false;
        const btn=document.getElementById("cameraScanProduct");
        if(btn){btn.disabled=false;btn.textContent="scan product";}
        closeCameraOverlay();
        render();
        setTimeout(()=>window.scrollTo({top:0,behavior:"smooth"}),80);
      },650);
    }
  }
  requestAnimationFrame(tick);
}
function bindCameraOverlayEvents(){
  document.getElementById("cameraClose").onclick=closeCameraOverlay;
  document.getElementById("cameraCancelDock").onclick=()=>{cameraInProgress=false;closeCameraOverlay();};
  document.getElementById("cameraScanProduct").onclick=startRecognitionScan;
  document.getElementById("cameraRetry").onclick=openCameraOverlay;
  document.getElementById("cameraManualSearch").onclick=()=>{cameraInProgress=false;closeCameraOverlay();state.activeTab="scan";render();setTimeout(()=>document.getElementById("foodName")?.focus(),80);};
  document.getElementById("cameraFlip").onclick=()=>{cameraFacingMode=cameraFacingMode==="environment"?"user":"environment";openCameraOverlay();};
}
render();bindCameraOverlayEvents();
</script>
</body>
